version: "3.9"

services:
  db:
    image: postgres:15
    container_name: food-db
    environment:
      POSTGRES_DB: fooddb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: food-backend
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: fooddb
      DB_USER: postgres
      DB_PASSWORD: postgres

  frontend:
    build: ./frontend
    container_name: food-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
